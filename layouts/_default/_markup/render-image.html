{{- $url := .Destination -}}
{{- if or (hasPrefix $url "http") (hasPrefix $url "/") -}}
  <img src="{{ $url | safeURL }}" alt="{{ .Text }}" loading="lazy" />
{{- else -}}
  {{- $res := .Page.Resources.GetMatch $url -}}
  {{- if $res -}}
    <img src="{{ $res.RelPermalink }}" alt="{{ .Text }}" loading="lazy" />
  {{- else -}}
    <img src="{{ $url | safeURL }}" alt="{{ .Text }}" loading="lazy" />
  {{- end -}}
{{- end -}}
