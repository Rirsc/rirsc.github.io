{{ define "main" }}

<article class="quote">

  <blockquote>
    {{ .Content }}
  </blockquote>

  <footer>

    <span class="author">
        {{ .Params.author }}
    </span>

    {{ if .Params.source }}
      <span class="source">
         {{ .Params.source }}
      </span>
    {{ end }}

  </footer>

</article>

{{ end }}
